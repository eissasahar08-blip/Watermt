.water-line{

  stroke-width:0.8;

  stroke-dasharray:4 6;

  animation: flow 60s linear infinite;
  opacity:0.6;
}

@keyframes flow{  
from{stroke-dashoffset:0;}  
to{stroke-dashoffset:-200;}  
}

from{stroke-dashoffset:0;}

}

function draw(){  
  if (!data || data.length === 0) return;

  data = data.map(clean);  

  document.querySelectorAll(".station,.area").forEach(e => e.remove());  
  svg.innerHTML = "";  

  /* ===== محطات ===== */  
  data.forEach(p => {  

    if(p.type === "محطة"){  

      let s = document.createElement("div");  
      s.className = "station";  
      s.style.left = p.x + "%";  
      s.style.top = p.y + "%";  

      s.onclick = () => {  
        popup.style.display = "block";  

        const safe = (v) => (v === undefined || v === null || v === "") ? "-" : v;

document.getElementById("popupContent").innerHTML = `
<div style="direction:rtl;text-align:right;font-family:Arial;">

  <b style="font-size:18px;display:block;margin-bottom:10px;">
    ${safe(p.name)}
  </b>

  🚰 <b>تستلم من:</b> ${safe(p.from)}<br>
  🚚 <b>تسلم إلى:</b> ${safe(p.to)}<br><br>

  📌 <b>المضخات:</b> ${safe(p.pumps)}<br>
  ⚙️ <b>ماركة المضخة:</b> ${safe(p.pumpBrand)}<br>
  🔧 <b>ماركة المحرك:</b> ${safe(p.engineBrand)}<br>
  ⚡ <b>المحولة:</b> ${safe(p.transformer)}<br>
  📅 <b>سنة بدء العمل:</b> ${safe(p.startYear)}<br><br>

  📊 <b>الغزارة:</b> ${safe(p.flow)}<br>
  👥 <b>عدد المستفيدين:</b> ${safe(p.beneficiaries)}<br>
  📈 <b>الرفع:</b> ${safe(p.lifting)}<br>
  🔄 <b>الدوران:</b> ${safe(p.rotation)}<br>
  
  🏔️ منسوب المحطة عن سطح البحر: ${p.elevation || "-"}<br>
🛢️ <b>سعة الخزان:</b> ${safe(p.tankCapacity)}<br>
📥 <b>قطر خط الدخل:</b> ${safe(p.inletDiameter)}<br>
📤 <b>قطر خط الخرج:</b> ${safe(p.outletDiameter)}<br><br>

  /* ===== خطوط المحطات ===== */  
  let stations = data.filter(d => d.type === "محطة");  

  for(let i = 0; i < stations.length - 1; i++){  

    let a = stations[i];  
    let b = stations[i + 1];  

    if(!a || !b) continue;  
if (
    // خرايب سالم ↔ نبع جيبول
    (a.name.includes("خرايب سالم") && b.name.includes("نبع جيبول")) ||
    (a.name.includes("نبع جيبول") && b.name.includes("خرايب سالم")) ||

    // خرايب سالم ↔ عين قبية
    (a.name.includes("خرايب سالم") && b.name.includes("عين قبية")) ||
    (a.name.includes("عين قبية") && b.name.includes("خرايب سالم")) ||

    // نبع جيبول ↔ عين قبية
    (a.name.includes("نبع جيبول") && b.name.includes("عين قبية")) ||
    (a.name.includes("عين قبية") && b.name.includes("نبع جيبول"))
){
    continue;
}
    if (
      (a.name === "قرفيص الثانية" && b.name === "محطة الزهراء") ||
      (a.name === "محطة الزهراء" && b.name === "قرفيص الثانية")
    ){
      continue;
    }

    let line = document.createElementNS("http://www.w3.org/2000/svg","line");  

    line.setAttribute("x1", a.x);  
    line.setAttribute("y1", a.y);  
    line.setAttribute("x2", b.x);  
    line.setAttribute("y2", b.y);  
    line.setAttribute("class", "station-line");  

    svg.appendChild(line);  
  }  

  /* ===== خط قرفيص الدالية → الزهراء ===== */  
  let dalia = data.find(d => d.name && d.name.includes("قرفيص الدالية"));  
  let zahraa = data.find(d => d.name && d.name.includes("محطة الزهراء"));  

  if(dalia && zahraa){  

    let line = document.createElementNS("http://www.w3.org/2000/svg","line");  

    line.setAttribute("x1", dalia.x);  
    line.setAttribute("y1", dalia.y);  
    line.setAttribute("x2", zahraa.x);  
    line.setAttribute("y2", zahraa.y);  
    line.setAttribute("class", "station-line");  

    svg.appendChild(line);  
  }  

  /* ===== مسارات المناطق ===== */  
  data.forEach(area => {  

    if(area.type !== "منطقة") return;  if (area.status !== "نعم") return;

    let station = data.find(s => s.name === area.source);  
    if(!station) return;  

    if(paths[area.name]){  

      let pts = [
        [station.x, station.y],
        ...paths[area.name],
        [area.x, area.y]
      ];

      for(let i = 0; i < pts.length - 1; i++){  

        let line = document.createElementNS("http://www.w3.org/2000/svg","line");  

        line.setAttribute("x1", pts[i][0]);  
        line.setAttribute("y1", pts[i][1]);  
        line.setAttribute("x2", pts[i+1][0]);  
        line.setAttribute("y2", pts[i+1][1]);  

        line.setAttribute("class", "water-line");  

        svg.appendChild(line);  
      }  

      return;  
    }  

  });  

  /* ===== قرفيص الأولى → الزهراء (path مضبوط) ===== */  

  let first = data.find(d => d.name && d.name.includes("قرفيص الاولى"));  

  if(first && zahraa){  

    let pts = [  
      [first.x, first.y],  
      [32.41, 91.37],  
      [40.71, 94.61],  
      [51.08, 91.07],  
      [zahraa.x, zahraa.y]  
    ];  

    let d = "M " + pts[0][0] + " " + pts[0][1];  

    for(let i = 1; i < pts.length; i++){
      d += " L " + pts[i][0] + " " + pts[i][1];
    }

    let path = document.createElementNS("http://www.w3.org/2000/svg","path");  
    path.setAttribute("d", d);  
    path.setAttribute("class", "station-line");  

    svg.appendChild(path);  
  }  
}


function addComment(){
  let text = document.getElementById("commentInput").value;

  console.log("sending:", text);

  db.collection("comments").add({
    text: text,
    time: Date.now()
  })
  .then(() => {
    console.log("saved ✔");
  })
  .catch(err => {
    console.log("ERROR ❌", err);
  });
}

function loadComments(){
  db.collection("comments")
    .orderBy("time","desc")
    .onSnapshot(snapshot => {

      let box = document.getElementById("commentsList");
      box.innerHTML = "";

      snapshot.forEach(doc => {
        let c = doc.data();

        let div = document.createElement("div");

        div.style.background = "#1a1a1a";
        div.style.border = "1px solid #333";
        div.style.padding = "10px";
        div.style.margin = "8px 0";
        div.style.borderRadius = "10px";
        div.style.textAlign = "right";
        div.style.color = "white";

        let deleteBtn = "";

        if(isAdmin){
          deleteBtn = `
            <button onclick="deleteComment('${doc.id}')"
              style="margin-top:8px;background:red;color:white;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;">
              حذف 🗑️
            </button>
          `;
        }

        div.innerHTML = `
          💬 ${c.text}<br>
          <span style="font-size:11px;color:#888;">
            🕒 ${new Date(c.time).toLocaleString()}
          </span>
          <br>
          ${deleteBtn}
        `;

        box.appendChild(div);
      });

    });
}

function deleteComment(id){
  db.collection("comments").doc(id).delete()
    .then(() => {
      console.log("comment deleted ✔");
    })
    .catch(err => {
      console.log("delete error ❌", err);
    });
}

loadComments();

  document.getElementById("popup").style.display = "none";
}

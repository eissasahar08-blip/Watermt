:root{
  --bg-deep:#0a1416;
  --bg-deep2:#0d1c20;
  --panel:#0f2229;
  --panel-2:#122a32;
  --line:rgba(120,196,204,0.16);
  --line-strong:rgba(120,196,204,0.32);
  --cyan:#2fc2d6;
  --cyan-soft:#7fdce8;
  --coral:#ff5a4e;
  --gold:#d9a441;
  --text:#eaf6f6;
  --muted:#8fb0b4;
  --shadow:0 10px 30px rgba(0,0,0,0.45);
}

*{box-sizing:border-box;}

body{
margin:0;
min-height:100vh;
background:
  radial-gradient(1100px 600px at 15% -10%, rgba(47,194,214,0.10), transparent 55%),
  radial-gradient(900px 500px at 100% 10%, rgba(217,164,65,0.06), transparent 50%),
  linear-gradient(180deg,var(--bg-deep) 0%,var(--bg-deep2) 100%);
color:var(--text);
font-family:'Tajawal',Arial,sans-serif;
text-align:center;
padding-bottom:28px;
}

::selection{background:var(--cyan);color:#04211f;}

.title-box{
position:relative;
background:linear-gradient(180deg,var(--panel),var(--panel-2));
padding:20px 18px 18px;
margin:16px auto 12px;
width:92%;
max-width:760px;
border-radius:18px;
border:1px solid var(--line);
box-shadow:var(--shadow);
overflow:hidden;
}

.title-box::before{
content:"";
position:absolute;
inset:0 0 auto 0;
height:3px;
background:linear-gradient(90deg,transparent,var(--cyan),var(--gold),transparent);
background-size:200% 100%;
animation:flowline 6s linear infinite;
}

@keyframes flowline{
0%{background-position:200% 0;}
100%{background-position:-200% 0;}
}

.brand-row{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
margin-bottom:8px;
}

.brand-badge-img{
  width:48px;height:48px;border-radius:50%;
  object-fit:cover;
  border:2px solid var(--line-strong);
  box-shadow:0 0 12px rgba(47,194,214,0.35);
  flex:none;
}

h2{
margin:2px 0;
font-family:'Cairo',Arial,sans-serif;
font-weight:800;
font-size:22px;
letter-spacing:0.2px;
color:#fff;
}

.subtitle{
display:flex;
align-items:center;
justify-content:center;
gap:6px;
margin:6px 0 12px;
font-size:12px;
color:var(--cyan-soft);
letter-spacing:0.5px;
}

.live-dot{
width:8px;height:8px;border-radius:50%;
background:var(--coral);
box-shadow:0 0 0 0 rgba(255,90,78,0.6);
animation:pulse 1.8s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(255,90,78,0.55);}
70%{box-shadow:0 0 0 9px rgba(255,90,78,0);}
100%{box-shadow:0 0 0 0 rgba(255,90,78,0);}
}

.credits{
font-size:13.5px;
line-height:1.9;
color:var(--muted);
border-top:1px dashed var(--line);
padding-top:10px;
margin-top:4px;
}

.bold{
font-size:14.5px;
font-weight:700;
color:#fff;
font-family:'Cairo',Arial,sans-serif;
}

/* ===== بطاقة عامة مشتركة ===== */
.panel-card{
width:92%;
max-width:760px;
margin:14px auto;
background:linear-gradient(180deg,var(--panel),var(--panel-2));
padding:16px;
border-radius:18px;
border:1px solid var(--line);
box-shadow:var(--shadow);
text-align:right;
}

.panel-title{
display:flex;
align-items:center;
gap:8px;
font-family:'Cairo',Arial,sans-serif;
font-weight:800;
font-size:16px;
color:#fff;
margin:0 0 12px;
}

.panel-title .bar{
width:4px;height:16px;border-radius:3px;
background:linear-gradient(180deg,var(--cyan),var(--gold));
flex:none;
}

#commentInput{
width:100%;
min-height:76px;
background:#081416;
color:var(--text);
border:1px solid var(--line);
border-radius:12px;
padding:12px;
font-family:'Tajawal',Arial,sans-serif;
font-size:14px;
resize:vertical;
}
#commentInput:focus{outline:2px solid var(--cyan);outline-offset:1px;}

.send-btn{
margin-top:10px;
padding:10px 22px;
background:linear-gradient(135deg,var(--cyan),#1e8fa0);
color:#04211f;
border:none;
border-radius:10px;
font-weight:800;
font-family:'Cairo',Arial,sans-serif;
cursor:pointer;
box-shadow:0 6px 16px rgba(47,194,214,0.25);
transition:transform .15s ease,box-shadow .15s ease;
}
.send-btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(47,194,214,0.35);}
.send-btn:active{transform:translateY(0);}

#commentsList{margin-top:12px;display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;}

.comment-bubble{
background:#0b1c20;
border:1px solid var(--line);
border-radius:12px;
padding:10px 12px;
text-align:right;
color:var(--text);
}
.comment-time{font-size:11px;color:var(--muted);display:block;margin-top:6px;}
.comment-del{
margin-top:8px;
background:rgba(255,90,78,0.12);
color:var(--coral);
border:1px solid rgba(255,90,78,0.35);
padding:5px 10px;
border-radius:8px;
cursor:pointer;
font-family:'Tajawal',Arial,sans-serif;
font-size:12.5px;
}

/* ===== الخريطة ===== */
.map-card{
width:92%;
max-width:760px;
margin:14px auto;
background:linear-gradient(180deg,var(--panel),var(--panel-2));
border-radius:18px;
border:1px solid var(--line);
box-shadow:var(--shadow);
padding:12px;
}

.map{
position:relative;
width:100%;
margin:0 auto;
border-radius:12px;
border:1px solid var(--line-strong);
overflow:hidden;
background:#04100f;
}

.map img{
width:100%;
display:block;
pointer-events:none;
}

svg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.station{
position:absolute;
width:11px;
height:11px;
background:var(--coral);
box-shadow:0 0 8px rgba(255,90,78,0.7);
border-radius:3px;
transform:translate(-50%,-50%);
animation:blink 1.5s infinite;
cursor:pointer;
}
.area{
position:absolute;
width:8px;
height:8px;
border-radius:50%;
background:var(--cyan);
box-shadow:0 0 7px rgba(47,194,214,0.7);
transform:translate(-50%,-50%);
animation:blink 2s infinite;
cursor:pointer;
}

.popup{
position:fixed;
top:16px;
left:16px;
right:16px;
margin:0 auto;
max-width:380px;
background:linear-gradient(180deg,#0f2229,#0a171b);
border:1px solid var(--line-strong);
padding:18px 16px 16px;
border-radius:16px;
display:none;
z-index:999999;
min-width:240px;
line-height:1.7;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
max-height:82vh;
overflow-y:auto;
}

.popup-close{
position:absolute;
top:10px;
left:10px;
background:rgba(255,90,78,0.15);
color:var(--coral);
border:1px solid rgba(255,90,78,0.4);
border-radius:8px;
width:30px;height:30px;
cursor:pointer;
font-size:15px;
line-height:1;
}

.station-line{
stroke:var(--coral);
stroke-width:0.7;
opacity:0.16;
stroke-dasharray:2 10;
animation:redFlow 80s linear infinite;
stroke-linecap:round;
fill:none;
}
.water-line{
fill:none;
stroke:var(--cyan);
stroke-width:0.8;
stroke-linecap:round;
stroke-dasharray:4 6;
animation: flow 60s linear infinite;
opacity:0.65;
}

@keyframes flow{
from{stroke-dashoffset:0;}
to{stroke-dashoffset:-200;}
}
@keyframes redFlow{
from{stroke-dashoffset:0;}
to{stroke-dashoffset:-800;}
}
@keyframes blink{
0%{opacity:0.35;}
50%{opacity:1;}
100%{opacity:0.35;}
}

/* ===== الدليل (Legend) ===== */
.legend{
width:92%;
max-width:760px;
margin:14px auto;
background:linear-gradient(180deg,var(--panel),var(--panel-2));
padding:14px 16px;
border-radius:18px;
border:1px solid var(--line);
box-shadow:var(--shadow);
font-size:14px;
text-align:right;
}

.legend-row{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:12px;
}

.legend-chip{
display:inline-flex;
align-items:center;
gap:7px;
background:#0b1c20;
border:1px solid var(--line);
padding:7px 12px;
border-radius:999px;
font-size:13px;
color:var(--text);
}

.box-red{width:11px;height:11px;background:var(--coral);display:inline-block;border-radius:3px;box-shadow:0 0 6px rgba(255,90,78,0.6);}
.box-blue{width:11px;height:11px;background:var(--cyan);display:inline-block;border-radius:50%;box-shadow:0 0 6px rgba(47,194,214,0.6);}

.add-img{
width:110px;
border-radius:10px;
border:1px solid var(--line-strong);
display:block;
margin:0 0 0 auto;
}

.admin-btn{
display:inline-flex;
align-items:center;
gap:8px;
margin:16px auto 6px;
padding:11px 22px;
background:#0b1c20;
color:var(--gold);
border:1px solid rgba(217,164,65,0.4);
border-radius:12px;
font-family:'Cairo',Arial,sans-serif;
font-weight:700;
font-size:14px;
cursor:pointer;
}
.admin-btn:hover{border-color:var(--gold);}

#viewsBox{
margin:10px auto 4px;
background:#0b1c20;
color:var(--muted);
padding:10px 16px;
width:fit-content;
min-width:180px;
border-radius:999px;
border:1px solid var(--line);
font-size:13px;
letter-spacing:0.3px;
}

@media (max-width:480px){
  h2{font-size:19px;}
  .panel-card,.map-card,.legend,.title-box{width:94%;border-radius:16px;}
}

      return;

  });  

  /* ===== قرفيص الأولى → الزهراء (path مضبوط) ===== */  

  let first = data.find(d => d.name && d.name.includes("قرفيص الاولى"));

function addComment(){
  let text = document.getElementById("commentInput").value;

  console.log("sending:", text);

  db.collection("comments").add({
    text: text,
    time: Date.now()
  })
  .then(() => {
    console.log("saved ✔");
  })
  .catch(err => {
    console.log("ERROR ❌", err);
  });
}

function loadComments(){
  db.collection("comments")
    .orderBy("time","desc")
    .onSnapshot(snapshot => {

      let box = document.getElementById("commentsList");
      box.innerHTML = "";

      snapshot.forEach(doc => {
        let c = doc.data();

        let div = document.createElement("div");
        div.className = "comment-bubble";

        let deleteBtn = "";

        if(isAdmin){
          deleteBtn = `
            <button class="comment-del" onclick="deleteComment('${doc.id}')">
              حذف 🗑️
            </button>
          `;
        }

        div.innerHTML = `
          💬 ${c.text}
          <span class="comment-time">🕒 ${new Date(c.time).toLocaleString()}</span>
          ${deleteBtn}
        `;

        box.appendChild(div);
      });

    });
}

function deleteComment(id){
  db.collection("comments").doc(id).delete()
    .then(() => {
      console.log("comment deleted ✔");
    })
    .catch(err => {
      console.log("delete error ❌", err);
    });
}

loadComments();
